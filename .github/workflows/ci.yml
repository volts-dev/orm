name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25']

    services:
      mysql:
        image: mysql:8.0
        ports:
          - 33306:3306
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: test_orm
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -ptest"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=30s

      postgres:
        image: postgres:16
        ports:
          - 54320:5432
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_orm
        options: >-
          --health-cmd="pg_isready -U postgres -d test_orm"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      MYSQL_TEST_HOST: 127.0.0.1:33306
      MYSQL_TEST_USER: root
      MYSQL_TEST_PASS: test
      POSTGRES_TEST_HOST: 127.0.0.1:54320
      POSTGRES_TEST_USER: postgres
      POSTGRES_TEST_PASS: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (with race detector + coverage)
        run: |
          rm -f test/test.db test/test.db-shm test/test.db-wal
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate coverage summary
        if: always()
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage.out
          retention-days: 7

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    # continue-on-error so first-pass lint surfaces issues without blocking
    # CI. Remove after Task 13 (first-pass remediation) is complete.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
